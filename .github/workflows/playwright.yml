name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      suite:
        description: "Test suite to run"
        required: false
        default: "smoke"
        type: choice
        options:
          - smoke
          - full

env:
  PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL }}
  WP_USERNAME: ${{ secrets.WP_USERNAME }}
  WP_PASSWORD: ${{ secrets.WP_PASSWORD }}
  STAGING_HTTP_USER: ${{ secrets.STAGING_HTTP_USER }}
  STAGING_HTTP_PASS: ${{ secrets.STAGING_HTTP_PASS }}

jobs:
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: mcr.microsoft.com/playwright:v1.56.1-noble
      options: --user 1001

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run smoke tests
        run: npm run test:smoke

      - name: Upload smoke report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-report
          path: playwright-report/
          retention-days: 7

  full:
    name: Full Regression
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Only run full suite on push to main (not on PRs) or manual trigger
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.suite == 'full')
    needs: smoke
    container:
      image: mcr.microsoft.com/playwright:v1.56.1-noble
      options: --user 1001

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run full regression
        # Runs only tests/regression — admin/api/frontend require a local WP instance
        # visualRegression.spec.ts is auto-excluded on CI via testIgnore in playwright.config.ts
        run: npm run test:ci

      - name: Upload full report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: full-regression-report
          path: playwright-report/
          retention-days: 14
