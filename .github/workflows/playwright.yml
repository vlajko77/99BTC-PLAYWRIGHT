name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      suite:
        description: "Test suite to run"
        required: false
        default: "smoke"
        type: choice
        options:
          - smoke
          - full

env:
  PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL }}
  WP_USERNAME: ${{ secrets.WP_USERNAME }}
  WP_PASSWORD: ${{ secrets.WP_PASSWORD }}
  STAGING_HTTP_USER: ${{ secrets.STAGING_HTTP_USER }}
  STAGING_HTTP_PASS: ${{ secrets.STAGING_HTTP_PASS }}

jobs:
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install browser system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run smoke tests
        run: npm run test:smoke

      - name: Upload smoke report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-report
          path: playwright-report/
          retention-days: 7

  full:
    name: Full Regression
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Only run full suite on push to main (not on PRs) or manual trigger
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.suite == 'full')
    needs: smoke

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install browser system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run full regression
        # visualRegression.spec.ts is auto-excluded on CI via testIgnore in playwright.config.ts
        # (snapshots are platform-specific; darwin baselines won't match Linux runner)
        run: npm run test:full

      - name: Upload full report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: full-regression-report
          path: playwright-report/
          retention-days: 14
